
#
# 0 - useless until now
#
study:
  slug: death-fr
  
#
# 1 - variables used in several commands
#
variables:
  
  # Contains all intermediate files of this study
  working-dir:  var/studies/death-fr
  
  # Contains the final documents generated by the program
  out-dir: &out-dir  output/studies/death-fr
  
  # Path to the sqlite database containing the data coming from data.gouv.fr
  sqlite-death-fr: var/studies/death-fr/death-fr.sqlite3
  
  # Path to the sqlite database containing temporary data to assist long command execution
  sqlite-tmp: var/studies/death-fr/tmp.sqlite3
  
  # list of planets involved in this study
  planets: &planets [SO, MO, ME, VE, MA, JU, SA, UR, NE, PL, NN]
  
  # possible-splits
  possible-splits:
    - all           # contains the full dataset
    - death-age     # dataset split by age at death - age limits are defined in observe\commands\studies\deathfr\split

#
# 2 - commands
#

# Execute several commands
# --------------------------------------------------------------------------
all:
  command: chain
  commands: []

# Initializes the temporary database containing temporary data to assist long command execution
# --------------------------------------------------------------------------
init:
  command: studies.deathfr.init

# Computes a "split" containing the full data set
# --------------------------------------------------------------------------
split-all:
  command: studies.deathfr.split
  split: all
  # Relative to working-dir - Splits are generated in working-dir/out-subdir
  out-subdir: split-all/data

# Split by age
# --------------------------------------------------------------------------
split-age:
  command: studies.deathfr.split
  split: death-age
  # Relative to working-dir - Splits are generated in working-dir/out-subdir
  out-subdir: split-death-age/data

# Computes the distribution of aspects between planets at birth and planets at death for split "all"
# --------------------------------------------------------------------------
distrib-aspect-all:
  command: studies.deathfr.aspects
  split: all
  # Data containing the bz2 splits are in working-dir/in-subdir
  in-subdir: split-all/data
  # Relative to working-dir - Aspect distributions are generated in working-dir/out-subdir
  out-subdir: split-all/distrib-aspects

# Computes the distribution of aspects between planets at birth and planets at death for split "death-age"
# --------------------------------------------------------------------------
distrib-aspect-age:
  command: studies.deathfr.aspects
  split: death-age
  # Relative to working-dir - Data containing the bz2 splits are in working-dir/in-subdir
  in-subdir: split-death-age/data
  # Relative to working-dir - Aspect distributions are generated in working-dir/out-subdir
  out-subdir: split-death-age/distrib-aspects

# Computes the control groups
# --------------------------------------------------------------------------
control:
  command: studies.deathfr.control
  # Number of control groups to build
  n-controls: 1
  # Number used to start naming controls
  # useful when performing several executions
  n-start: 1
  # Relative to working-dir - Control distributions are generated in working-dir/out-subdir
  out-subdir: control

# Computes the average distributions from control groups
# --------------------------------------------------------------------------
average:
  command: studies.deathfr.average
  # Relative to working-dir - Control distributions are taken from working-dir/in-subdir
  in-subdir: control
  # Relative to working-dir - Average is generated in working-dir/out-subdir
  out-subdir: distrib-average

# Computes chi square and p values by comparing average and observed distributions for split death-age
# --------------------------------------------------------------------------
chi2-age:
  command: studies.deathfr.chi2
  split: death-age
  # Relative to working-dir - The expected distributions are in working-dir/in-expected-subdir
  in-expected-subdir: distrib-average
  # Relative to working-dir - The observed distributions of the split are in working-dir/in-observed-subdir
  in-observed-subdir: split-death-age/distrib-aspects
  # Relative to working-dir - Results are generated in working-dir/out-subdir
  out-subdir: split-death-age/chi2
  
# Computes chi square and p values by comparing average and observed distributions for split all
# --------------------------------------------------------------------------
chi2-all:
  command: studies.deathfr.chi2
  split: all
  # Relative to working-dir - The expected distributions are in working-dir/in-expected-subdir
  in-expected-subdir: distrib-average
  # Relative to working-dir - The observed distributions of the split are in working-dir/in-observed-subdir
  in-observed-subdir: split-all/distrib-aspects
  # Relative to working-dir - Results are generated in working-dir/out-subdir
  out-subdir: split-all/chi2
  
  