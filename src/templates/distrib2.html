use observe\commands\shared\output\statsOneDistrib;
use observe\commands\shared\output\tocInteraspects;

$statsExp =& $V['stats-exp'];
$dateName =& $V['date-name']; // ex: birth-death
?>

<!-- 
    Table of contents
-->
<ul class="naked spaced">
    <li><a class="bold" href="#age">Age</a></li>
    <li>
        <div class="bold">Relations between planets</div>
        <div class="padding-left2 padding-top05">
            <?= tocInteraspects::html($V['planets'], '#relations-planets-', $statsObs) ?>

-->

    Relations between planets
-->
<?php 
for($i=0; $i < count($V['planets']); $i++){

        $planetName1 = strtolower(IAA::PLANET_NAMES[$V['planets'][$i]]);

        $dateName1 = $V['date-names'][0];
        $dateName2 = $V['date-names'][1];
        $alt_1 = "Distribution of aspects between $planetName1 ($dateName1) and $planetName2 ($dateName2)";
        $alt_2 = "Positions of $planetName1 ($dateName1) and $planetName2 ($dateName2)";
?>
        <h2 id="<?= 'relations-planets-' . $code ?>">Relations between <?= "$planetName1 ($dateName1) and $planetName2 ($dateName2)" ?></h2>
        
        <img loading="lazy" class="svg" src="img/<?= $dateName ?>/interaspects/<?= $code ?>.svg" alt="<?= $alt_1 ?>">
        <?= statsOneDistrib::html($statsObs['interaspects'][$code], $statsExp['interaspects'][$code]) ?>
        
        <img loading="lazy" class="margin border" src="img/<?= $dateName ?>/castille/<?= $code ?>.png" alt="<?= $alt_2 ?>">
