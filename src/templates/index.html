<?php
/******************************************************************************
    
    Home page of a study.
    
    Called with a variable $V, associative array containing the keys:
        - dates         ex: ['birth', 'death']
        - planets       List of IAA codes.
        - stats-obs     Stats about the observed distributions - structure described in observe\model\distrib\StatsDistrib

    @license    GPL
    @copyright  Thierry Graff
    @history    2026-04-05 08:24:23+01:00, Thierry Graff : Creation
********************************************************************************/

use observe\commands\shared\output\tocAspects;
use observe\commands\shared\output\tocInteraspects;
use tigeph\model\IAA;

// shortcuts
$statsObs =& $V['stats-obs'];
?>

<!-- 
    Distributions of type distrib1
-->
<?php foreach($V['dates'] as $dateName): ?>
    <h2><a href="<?= $dateName ?>.html"><?= ucfirst($dateName) ?></a></h2>
    <ul class="naked spaced">
        <li><a class="bold" href="<?= $dateName ?>.html#day">Days</a></li>
        <li><a class="bold" href="<?= $dateName ?>.html#year">Years</a></li>
        <li>
            <div class="bold">Planet positions</div>
            <div class="padding-left2 padding-top05">
                <?php foreach($V['planets'] as $planet): ?>
                    <span class="padding-right"><a href="<?= $dateName ?>.html#position-<?= $planet ?>"><?= IAA::PLANET_NAMES[$planet] ?></a></span>
                <?php endforeach; ?>
            </div>
        </li>
        <li>
            <div class="bold">Aspects</div>
            <div class="padding-left2 padding-top05">
                <?= tocAspects::html($V['planets'], $dateName . '.html#aspect-', $statsObs[$dateName]) ?>
            </div>
        </li>
    </ul>
<?php endforeach; ?>

<!-- 
    Distributions of type distrib2
-->
<?php 
for($i=0; $i < count($V['dates']); $i++):
    for($j=$i+1; $j < count($V['dates']); $j++):
        $dateName = $V['dates'][$i] . '-' . $V['dates'][$j]; // ex: birth-death
?>
        <h2><a href="<?= $dateName ?>.html"><?= ucfirst($dateName) ?></a></h2>
        <ul class="naked spaced">
            <li><a class="bold" href="<?= $dateName ?>.html#age">Age</a></li>
            <li>
                <div class="bold">Relations between planets</div>
                <div class="padding-left2 padding-top05">
                    <?= tocInteraspects::html($V['planets'], $dateName . '.html#relations-planets-', $statsObs[$dateName]) ?>
                </div>
            </li>
        </ul>
<?php 
    endfor;
endfor;
?>
