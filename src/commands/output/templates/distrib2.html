use observe\commands\output\statsOneDistrib;
use observe\commands\output\tocInteraspects;
use tigeph\model\IAA;

// shortcuts
$statsObs =& $V['stats-obs'];
$statsExp =& $V['stats-exp'];
$dateName =& $V['date-name']; // ex: birth-death
?>

<!-- 
    Table of contents
-->
<ul class="naked spaced">
    <li><a class="bold" href="#age">Age</a></li>
    <li>
        <div class="bold">Relations between planets</div>
        <div class="padding-left2 padding-top05">
            <?= tocInteraspects::html(
                $V['planets'],
                '#relations-planets-',

                ucfirst($V['date-labels'][0]),
                ucfirst($V['date-labels'][1]),
            ) ?>
        </div>
    </li>
</ul>

<!-- 
    Age
-->
<br>
<div class="float-left">
    <img id="age" loading="lazy" class="svg" src="img/<?= $dateName ?>/age/dim1/age-Y.svg" alt="Distribution of age (years)">

    See also <a href="img/<?= $dateName ?>/age/dim1/age-M.svg">Distribution in months</a>

<!-- 
    Relations between planets
-->
<?php 
for($i=0; $i < count($V['planets']); $i++){
    for($j=0; $j < count($V['planets']); $j++){
        $planetName1 = strtolower(IAA::PLANET_NAMES[$V['planets'][$i]]);
        $planetName2 = strtolower(IAA::PLANET_NAMES[$V['planets'][$j]]);
        $code = $V['planets'][$i] . '-' . $V['planets'][$j];
        $dateName1 = $V['date-labels'][0];
        $dateName2 = $V['date-labels'][1];
        $alt1 = "Aspects $planetName1 $dateName1 - $planetName2 $dateName2";
        $alt2 = "Positions of $planetName1 $dateName1 and $planetName2 $dateName2";
?>
        <h2 id="<?= 'relations-planets-' . $code ?>"><?= ucFirst("$planetName1 $dateName1 - $planetName2 $dateName2") ?></h2>
        
        <img loading="lazy" class="svg" src="img/<?= $dateName ?>/interaspects/dim1/<?= $code ?>.svg" alt="<?= $alt1 ?>">
        <?= statsOneDistrib::html($statsObs['interaspects'][$code], $statsExp['interaspects'][$code]) ?>
        
        <div class="float-left">
            <img loading="lazy" class="margin border" src="img/<?= $dateName ?>/interaspects/dim2/<?= $code ?>.png" alt="<?= $alt2 ?>">
        </div>
        <div class="float-left margin-top margin-left">
            <a href="csv/<?= $V['date-name'] ?>/interaspects/dim2/<?= $code ?>.csv.zip">Download CSV file</a>
        </div>
        <br class="clear-left">
<?php 
    }
