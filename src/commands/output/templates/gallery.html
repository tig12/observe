use tigeph\model\IAA;
use observe\model\Misc;

//
// Links, for table of contents.
//
$links = [];
$labels = [];
// same planets
for($i=0; $i < count($V['dates']); $i++):
    for($j=$i+1; $j < count($V['dates']); $j++):
        $dateName1 = $V['dates'][$i];
        $dateName2 = $V['dates'][$j];
        $dateName = "$dateName1-$dateName2"; // ex: birth-death
        $links[] = "same-planets-$dateName";
        $labels[] = "Same planets, $dateName";
    endfor;
endfor;
// planets
foreach($V['planets'] as $planet):
    $planetName = IAA::PLANET_NAMES[$planet];
    $links[] = "#planet-$planet";
    $labels[] = $planetName;
endforeach;
?>

<!-- Table of contents -->
<ul class="simple">
<?php for($i=0; $i < count($links); $i++): ?>
    <li><a href="<?= $links[$i] ?>"><?= $labels[$i] ?></a></li>
<?php endfor; ?>
</ul>
