use tigeph\model\IAA;

// shortcuts
?>

<!-- ********************************************************************************* -->
<h2>Diagonal</h2>

When we look at the distributions of planet at birth / planet at death, they all show a diagonal line indicating that their position at death tend to be the same at their position at birth.

<br>

<?php 
for($i=0; $i < count($V['dates']); $i++):
    for($j=$i+1; $j < count($V['dates']); $j++):
        $dateName = $V['dates'][$i] . '-' . $V['dates'][$j]; // ex: birth-death
        foreach($V['planets'] as $planet):
            $planetName = IAA::PLANET_NAMES[$planet];
            $codePlanet = "$planet-$planet";
            $label = "$planetName {$V['dates'][$i]} - $planetName {$V['dates'][$j]}";
            $img_url = "img/$dateName/interaspects/dim2/$codePlanet.png";
            $alt = "Positions of $label";
?>

<div class="float-left">
    <a href="<?= $img_url ?>">
    <figure>
        <figcaption class="center"><?= $label ?></figcaption>
            <img
                    class="border margin "
                    width="250"
                    height="250"
                    src="<?= $img_url ?>"
                    alt="<?= $alt ?>"
            >
    </figure>
    </a>
</div>
<?php
        endforeach;
    endfor;
endfor;
?>

<br class="clear-left">



<?php
foreach($V['planets'] as $planet1):
    $planetName1 = IAA::PLANET_NAMES[$planet1];
?>
    <!-- ********************************************************************************* -->
    <h2><?= $planetName1 ?></h2>
    
    <!-- Aspects of $planet1, birth-birth and death-death -->
    
    <?php foreach($V['dates'] as $dateName): ?><!-- ex: birth -->
        <div class="float-left">
            <!-- ************************************* -->
            <h3 class="center">Aspects at <?= $dateName ?></h3>
            <?php 
            foreach($V['planets'] as $planet2):
                if($planet1 == $planet2){
                    continue;
                }
                $planetName2 = IAA::PLANET_NAMES[$planet2];
                $code = "$planet1-$planet2";
                $label = "$planetName1 $dateName - $planetName2 $dateName";
                $img_url = "img/$dateName/aspects/dim2/$code.png";
                $alt = "Positions of $label";
            ?>
                <a href="<?= $img_url ?>">
                <figure>
                    <figcaption class="center"><?= $label ?></figcaption>
                        <img
                                class="border margin "
                                width="250"
                                height="250"
                                src="<?= $img_url ?>"
                                alt="<?= $alt ?>"
                        >
                </figure>
                </a>
            <?php endforeach; ?><!-- end loop on $planet2 -->
        </div>
    <?php endforeach; ?><!-- end loop on $dateName -->
        
    
    <!-- Interaspects -->
    
    <?php
    foreach($V['dates'] as $dateName1):
        foreach($V['dates'] as $dateName2):
            if($dateName1 == $dateName2){
                continue;
            }
            $dateName = "$dateName1-$dateName2"; // ex: birth-death
    ?>
            <div class="float-left">
                <!-- ************************************* -->
                <h3 class="center">Interaspects <?= $dateName ?></h3>
                <?php 
                foreach($V['planets'] as $planet2):
                    if($planet1 == $planet2){
                        continue;
                    }
                    $planetName2 = IAA::PLANET_NAMES[$planet2];
                    $code = "$planet1-$planet2";
                    $label = "$planetName1 $dateName - $planetName2 $dateName";
                    $img_url = "img/$dateName/interaspects/dim2/$code.png";
                    $alt = "Positions of $label";
                ?>
                    <a href="<?= $img_url ?>">
                    <figure>
                        <figcaption class="center"><?= $label ?></figcaption>
                            <img
                                    class="border margin "
                                    width="250"
                                    height="250"
                                    src="<?= $img_url ?>"
                                    alt="<?= $alt ?>"
                            >
                    </figure>
                    </a>
                <?php endforeach; ?><!-- end loop on $planet2 -->
            </div>
        <?php endforeach; ?><!-- end loop on $dateName2 -->
    <?php endforeach; ?><!-- end loop on $dateName1 -->
    
    <br class="clear-left">
    
<?php endforeach; ?><!-- end loop on $planet1 -->


<br class="clear-left">
