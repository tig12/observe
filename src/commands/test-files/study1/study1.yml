
#
# 1 - Parameters common to all studies
#

# Unique id of this study
slug: death-fr

# Contains all intermediate files of this study
# Path relative to observe root directory, or absolute path
working-dir:  src/commands/test-files/var/study1

# Contains the final documents generated by the program
# Path relative to observe root directory, or absolute path
out-dir: output/studies/study1

# list of planets involved in this study (IAA codes)
planets: [SO, MO, ME, VE, MA, JU, SA, UR, NE, PL, NN]

# Possible splits of this command
splits:
  - full
  - age

# Description of the dates contained in the split files
# The order of this array must correspond to the order of the columns in the split files
dates:
  - birth
  - death

# Unit used in the age.csv distributions
# Can be Y, M or D
distrib-age-unit: M

# Precision (nb of digits for decimal part) of the numbers stored in expected distributions
expected-precision: 2

#
# 2 - Parameters specific to this study
#

# Path to the sqlite database containing the data coming from data.gouv.fr
# Path relative to observe root directory, or absolute path
sqlite-death-fr: src/commands/test-files/var/study1/death-fr-10.sqlite3

# Path to the sqlite database containing temporary data to assist long command execution
# Path relative to observe root directory, or absolute path
sqlite-tmp: src/commands/test-files/var/study1/tmp.sqlite3

# When building splits and controls, use a limit clause when reading the death-fr database.
# This avoids to load the whole database in memory and consume too much RAM (13 Go for the whole db)
split-limit: 3
control-limit: 3
