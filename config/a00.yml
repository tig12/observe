
#
# 1 - Parameters common to all studies
#

# Unique id of this study
slug: a00

# fqcn = fully qualified class name of the class handling this study
fqcn: observe\studies\a00\A00

# Contains all intermediate files of this study
# Path relative to observe root directory, or absolute path
working-dir:  var/studies/a00

# Contains the final documents generated by the program
# Path relative to observe root directory, or absolute path
out-dir: output/studies/a00

# List of planets involved in this study (IAA codes)
planets: [SO, MO, ME, VE, MA, JU, SA, UR, NE, PL, NN]

# Precision of the dates
# Can be "day" (if the dates of the dataset don't include time) or "time"
date-precision: day

# Names of the dates contained in data.csv.bz2
# The order of this array must correspond to the order of the columns in data.csv.bz2
dates:
  - mother
  - father
  - child
  - wedding

# Limit of p-value to consider that an anomaly is detected
p-value-limit: 0.05

# Precision (nb of digits for decimal part) of the numbers stored in expected distributions
expected-precision: 2

output:
  title: Births in France in 2000
  subtitle: 591 936 { mother, father, child, wedding }
  description: Statistical analysis of the persons born in France in 2000.
  intro: |
    This study concerns persons born in France in 2000.
    <br>The dataset contains 591 936 lines with { mother, father, child } out of which 321 838 contain also wedding dates.
    <br>The data were sent by Didier Castille, who agreed to make them publicly available online but asked to accompany the data with this notice:
    <div class="margin-left2">
      <cite>
        These files are not INSEE files, they are INSEE files adapted by D. Castille.
        <br>These files are neither official nor scientifically valid because they depend on the good faith of D. Castille. 
      </cite>
    </div>
    See <a href="https://tig12.github.io/observe/studies/a00.html">tig12.github.io/observe/studies/a00.html</a> for more details.
    <br>Expected values were computed using 100 control groups.

#
# 2 - Parameters specific to this study
#

# Path to the csv file sent by Didier Castille
raw-file-path: var/studies/a00/a00.csv
